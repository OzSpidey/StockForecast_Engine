<svg width="900" height="480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="480" fill="#fafafa"/>

  <!-- Top bar -->
  <rect width="900" height="52" fill="#1a1a2e"/>
  <text x="22" y="22" fill="#58a6ff" font-size="16" font-weight="700">Stock Forecasting API</text>
  <rect x="22" y="30" width="38" height="14" fill="#009688" rx="7"/>
  <text x="41" y="41" fill="#fff" font-size="9" text-anchor="middle">1.0.0</text>
  <text x="74" y="41" fill="#8b8fa8" font-size="11">Next-day close price predictions powered by XGBoost + MLflow</text>
  <text x="800" y="34" fill="#8b8fa8" font-size="11">/openapi.json</text>

  <!-- OAS info box -->
  <rect x="16" y="60" width="868" height="36" fill="#e8f4f8" rx="4" stroke="#b3d9e8" stroke-width="1"/>
  <text x="30" y="83" fill="#0277bd" font-size="11">Servers:  http://localhost:8000</text>

  <!-- ── Endpoint cards ──────────────────────────────────────────── -->

  <!-- GET /predict/{ticker} -->
  <rect x="16" y="106" width="868" height="50" fill="#e8f5e9" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="16" y="106" width="68" height="50" fill="#2e7d32" rx="4 0 0 4"/>
  <text x="50" y="136" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">GET</text>
  <text x="100" y="126" fill="#2e7d32" font-size="13" font-weight="600">/predict/{ticker}</text>
  <text x="100" y="144" fill="#555" font-size="11">Returns next-day predicted closing price, direction (UP/DOWN), and model metrics for a given ticker.</text>
  <text x="860" y="136" fill="#888" font-size="11" text-anchor="end">▼</text>

  <!-- GET /predict/all -->
  <rect x="16" y="166" width="868" height="50" fill="#e8f5e9" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="16" y="166" width="68" height="50" fill="#2e7d32" rx="4 0 0 4"/>
  <text x="50" y="196" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">GET</text>
  <text x="100" y="186" fill="#2e7d32" font-size="13" font-weight="600">/predict/all</text>
  <text x="100" y="204" fill="#555" font-size="11">Batch prediction for all trained tickers. Returns array of predictions with succeeded/failed counts.</text>
  <text x="860" y="196" fill="#888" font-size="11" text-anchor="end">▼</text>

  <!-- GET /health -->
  <rect x="16" y="226" width="868" height="50" fill="#e8f5e9" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="16" y="226" width="68" height="50" fill="#2e7d32" rx="4 0 0 4"/>
  <text x="50" y="256" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">GET</text>
  <text x="100" y="246" fill="#2e7d32" font-size="13" font-weight="600">/health</text>
  <text x="100" y="264" fill="#555" font-size="11">Service health check. Returns trained tickers, available tickers, and any stale models (>7 days old).</text>
  <text x="860" y="256" fill="#888" font-size="11" text-anchor="end">▼</text>

  <!-- GET /tickers -->
  <rect x="16" y="286" width="868" height="50" fill="#e8f5e9" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <rect x="16" y="286" width="68" height="50" fill="#2e7d32" rx="4 0 0 4"/>
  <text x="50" y="316" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">GET</text>
  <text x="100" y="306" fill="#2e7d32" font-size="13" font-weight="600">/tickers</text>
  <text x="100" y="324" fill="#555" font-size="11">Returns the list of supported tickers.</text>
  <text x="860" y="316" fill="#888" font-size="11" text-anchor="end">▼</text>

  <!-- Sample response panel -->
  <rect x="16" y="350" width="868" height="118" fill="#1a1a2e" rx="6"/>
  <text x="30" y="370" fill="#8b949e" font-size="11">Sample response — GET /predict/AAPL</text>
  <text x="30" y="390" fill="#79c0ff" font-size="11">{</text>
  <text x="48" y="406" fill="#8b949e" font-size="11">"ticker":                  </text><text x="160" y="406" fill="#a5d6ff" font-size="11">"AAPL",</text>
  <text x="48" y="420" fill="#8b949e" font-size="11">"current_price":           </text><text x="200" y="420" fill="#ffa657" font-size="11">189.30,</text>
  <text x="48" y="434" fill="#8b949e" font-size="11">"predicted_price":         </text><text x="210" y="434" fill="#ffa657" font-size="11">191.45,</text>
  <text x="48" y="448" fill="#8b949e" font-size="11">"direction":               </text><text x="175" y="448" fill="#3fb950" font-size="11">"UP",</text>
  <text x="48" y="462" fill="#8b949e" font-size="11">"test_directional_accuracy": </text><text x="260" y="462" fill="#ffa657" font-size="11">54.8</text>
  <text x="30" y="462" fill="#79c0ff" font-size="11">}</text>
</svg>
